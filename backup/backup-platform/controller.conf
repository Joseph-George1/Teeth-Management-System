# =============================================================================
# controller.conf — Backup Platform Controller Configuration
# =============================================================================
# This file is sourced by controller.sh at startup.
# Uncomment and edit values as needed. All settings have built-in defaults.
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
CONTROLLER_BASE="/opt/backup-platform"
SERVERS_JSON="${CONTROLLER_BASE}/servers.json"
BACKUPS_DIR="${CONTROLLER_BASE}/backups"
LOGS_DIR="${CONTROLLER_BASE}/logs"
KEYS_DIR="${CONTROLLER_BASE}/keys"
META_DIR="${CONTROLLER_BASE}/metadata"
SCRIPTS_DIR="${CONTROLLER_BASE}/scripts"
CONTROLLER_LOG="${LOGS_DIR}/controller.log"

# ---------------------------------------------------------------------------
# SSH
# ---------------------------------------------------------------------------
SSH_USER="ubuntu"
SSH_PORT=22
# Additional SSH options (space-separated)
SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15 -o BatchMode=yes -o ServerAliveInterval=30"

# Remote temp directory on managed nodes
REMOTE_TMP="/tmp/bkp_agent"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# debug | info | warn
LOG_LEVEL="info"

# ---------------------------------------------------------------------------
# Reliability
# ---------------------------------------------------------------------------
MAX_RETRIES=3
RETRY_DELAY=10      # seconds between retries

# ---------------------------------------------------------------------------
# Backup Behaviour
# ---------------------------------------------------------------------------

# Run backups in parallel across servers (true/false)
PARALLEL=false

# Encrypt backup archives with GPG at rest (true/false)
ENCRYPT=false
# GPG recipient key ID (required if ENCRYPT=true)
# GPG_RECIPIENT="backup-team@example.com"

# Use rsync-based incremental transfer (true/false)
INCREMENTAL=false

# Retain backups for N days (older archives are pruned)
BACKUP_RETENTION_DAYS=30

# ---------------------------------------------------------------------------
# Remote Storage (optional)
# ---------------------------------------------------------------------------
# Push completed backups to an S3 bucket or remote SSH target.
# Leave empty to disable.
#
# S3 example:  REMOTE_STORAGE="s3://my-backup-bucket/servers"
# SSH example: REMOTE_STORAGE="backupuser@storage.internal:/mnt/backups"
REMOTE_STORAGE=""

# ---------------------------------------------------------------------------
# Oracle Credentials (secure — prefer vault over env)
# ---------------------------------------------------------------------------
# Preferred: Store Oracle SYS password in /etc/bkp_vault/oracle_sys.pass
#            with chmod 600, owned by root.
# Fallback:  Set ORACLE_SYS_PASS here (not recommended for production).
#
# ORACLE_SYS_PASS=""

# ---------------------------------------------------------------------------
# Notifications (optional — extend controller.sh to use these)
# ---------------------------------------------------------------------------
# NOTIFY_EMAIL="ops-team@example.com"
# SLACK_WEBHOOK_URL="https://hooks.slack.com/services/..."
