<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>403 - الوصول مرفوض</title>
    <style>
      :root {
        --bg-1: #c4edfc;
        --bg-2: #a2f9cf;
        --surface: rgba(255, 255, 255, 0.94);
        --primary: #1d61e7;
        --primary-2: #25b4e5;
        --text: #111827;
        --muted: #6c7278;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--text);
      }

      .card {
        width: min(720px, 100%);
        background: var(--surface);
        border-radius: 24px;
        padding: 36px 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        text-align: center;
      }

      .code {
        margin: 0;
        font-size: clamp(64px, 14vw, 108px);
        font-weight: 900;
        color: var(--primary);
        line-height: 1;
      }

      .title {
        margin: 12px 0 8px;
        font-size: clamp(24px, 5vw, 34px);
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .meme {
        margin: 0 auto 24px;
        max-width: 560px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 18px;
        padding: 18px;
        text-align: left;
        direction: ltr;
        font-family: "Courier New", monospace;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .meme-line {
        margin: 0;
        white-space: pre-wrap;
      }

      .meme-line + .meme-line {
        margin-top: 10px;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        border-radius: 12px;
        padding: 13px 24px;
        font-weight: 700;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        border: 2px solid var(--primary);
        color: var(--primary);
        background: transparent;
      }

      .hint {
        margin-top: 18px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="code">403</p>
      <h1 class="title">الوصول مرفوض</h1>
      <p class="subtitle">
        السيرفر رفض الطلب، هذه صفحة مخصصة بطابع تقني بطل لعب يا حبيبي.
      </p>

      <section class="meme" aria-label="Tech meme">
        <p class="meme-line">dev@thoutha:~$ curl -I https://thoutha.page/secure</p>
        <p class="meme-line">HTTP/1.1 403 Forbidden</p>
        <p class="meme-line">Me: "but it worked locally 😅"</p>
        <p class="meme-line">Server: "Access denied, human 🤖"</p>
      </section>

      <div class="actions">
        <a class="btn btn-primary" href="/">العودة للرئيسية</a>
        <a class="btn btn-secondary" href="/login">تسجيل الدخول</a>
      </div>

      <p class="hint">Apache custom error page</p>
    </main>
  </body>
</html>
